name: Release

on:
  push:
    tags: ['docs-v*']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  DOCS_BUCKET: flux-docs-327796148992
  APP_CF_DISTRIBUTION_ID: E1ABUIC4DB7I86

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync docs to S3
        run: |
          aws s3 sync build/ s3://${{ env.DOCS_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.APP_CF_DISTRIBUTION_ID }} \
            --paths "/docs/*"
